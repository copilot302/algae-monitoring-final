services:
  - type: web
    name: phycosense-backend
    env: node
    region: oregon # Choose: oregon, frankfurt, singapore
    plan: free # or starter ($7/month)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # You'll set this manually in Render dashboard
